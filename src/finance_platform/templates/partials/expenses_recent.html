<ul style="list-style:none;padding:0.25rem 0">
{% for e in expenses %}
<li style="padding:0.25rem 0;font-size:0.875rem;border-bottom:1px solid var(--color-border)">
<a href="/expenses/{{ e.id }}">{{ e.title }}</a> — {{ e.amount }} <span class="badge status-{{ e.status }}">{{ e.status }}</span>
</li>
{% endfor %}
</ul>
