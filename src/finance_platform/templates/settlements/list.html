{% extends "base.html" %}
{% block title %}Settlements — Finance Platform{% endblock %}
{% block content %}
<section class="page-header">
    <h1>Settlements</h1>
    <p class="subtitle">Settlement runs and allocation status</p>
</section>

<div class="filters">
    <select name="status_filter" class="filter-select"
            hx-get="/settlements" hx-trigger="change" hx-target="#settlements-table">
        <option value="">All Statuses</option>
        <option value="pending">Pending</option>
        <option value="processing">Processing</option>
        <option value="completed">Completed</option>
    </select>
</div>

<div id="settlements-table" hx-get="/settlements" hx-trigger="load">
    <div class="skeleton">Loading settlements…</div>
</div>
{% endblock %}
